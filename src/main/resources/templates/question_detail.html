<!doctype html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}">

<body>

<div layout:fragment="content" class="container my-3">

    <!-- 질문 -->
    <h2 class="border-bottom py-2" th:text="${question.subject}"></h2>

    <div class="card my-3">
        <div class="card-body">

            <div class="card-text"
                 style="white-space: pre-line;"
                 th:text="${question.content}"></div>

            <div class="d-flex justify-content-end">
                <div class="badge bg-light text-dark p-2 text-start">

                    <!-- 질문 작성자 -->
                    <div class="mb-2">
                        <span th:if="${question.author != null}"
                              th:text="${question.author.username}"></span>
                    </div>

                    <!-- 질문 작성일 -->
                    <div th:text="${#temporals.format(question.createDate,'yyyy-MM-dd HH:mm')}"></div>

                </div>
            </div>

        </div>
    </div>

    <!-- 답변 수 -->
    <h5 class="border-bottom my-3 py-2"
        th:text="|${#lists.size(question.answerList)}개의 답변이 있습니다.|"></h5>


    <!-- 답변 반복 시작 -->
    <div class="card my-3" th:each="answer : ${question.answerList}">
        <div class="card-body">

            <div class="card-text"
                 style="white-space: pre-line;"
                 th:text="${answer.content}"></div>

            <div class="d-flex justify-content-end">
                <div class="badge bg-light text-dark p-2 text-start">

                    <!-- 답변 작성자 추가 -->
                    <div class="mb-2">
                        <span th:if="${answer.author != null}"
                              th:text="${answer.author.username}"></span>
                    </div>

                    <!-- 답변 작성일 -->
                    <div th:text="${#temporals.format(answer.createDate,'yyyy-MM-dd HH:mm')}"></div>

                </div>
            </div>

        </div>
    </div>
    <!-- 답변 반복 끝 -->


    <!-- 답변 작성 -->
    <form th:action="@{|/answer/create/${question.id}|}"
          th:object="${answerForm}"
          method="post"
          class="my-3">

        <!-- 에러 fragment 호출 -->
        <div th:replace="~{form_errors :: formErrorsFragment}"></div>

        <!-- 비로그인 사용자 -->
        <textarea sec:authorize="isAnonymous()"
                  disabled
                  th:field="*{content}"
                  rows="10"
                  class="form-control"></textarea>

        <!-- 로그인 사용자 -->
        <textarea sec:authorize="isAuthenticated()"
                  th:field="*{content}"
                  rows="10"
                  class="form-control"></textarea>

        <input type="submit"
               value="답변등록"
               class="btn btn-primary my-2">

    </form>

</div>

</body>
</html>
